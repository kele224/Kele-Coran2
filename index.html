<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kele-Coran | Officiel</title>
    
    <!-- Meta tags PWA -->
    <meta name="theme-color" content="#000000">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/2850/2850811.png">
    <link rel="manifest" id="manifest-link">

    <link href="https://fonts.googleapis.com/css2?family=Amiri&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    
    <style>
        :root { --gold: #D4AF37; --green: #064e3b; --black: #000; --card-bg: rgba(255,255,255,0.07); }
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            margin: 0; background: radial-gradient(circle at top, var(--green) 0%, var(--black) 100%);
            color: white; font-family: 'Poppins', sans-serif; min-height: 100vh;
            padding-bottom: 160px; /* Espace pour le player */
        }

        header { 
            text-align: center; padding: 15px; border-bottom: 1px solid rgba(212, 175, 55, 0.3); 
            background: rgba(0,0,0,0.8); backdrop-filter: blur(10px); position: sticky; top:0; z-index:100;
        }
        .logo { color: var(--gold); font-size: 22px; font-weight: bold; letter-spacing: 2px; }
        
        .panel { 
            background: rgba(0,0,0,0.6); margin: 15px; padding: 20px; border-radius: 20px; 
            border: 1px solid rgba(212, 175, 55, 0.2); backdrop-filter: blur(5px);
        }
        
        label { font-size: 10px; color: var(--gold); text-transform: uppercase; font-weight: bold; margin-bottom: 5px; display: block; }
        
        select, input { 
            width: 100%; padding: 12px; margin-bottom: 15px; background: rgba(255,255,255,0.05); 
            border: 1px solid rgba(212, 175, 55, 0.3); color: white; border-radius: 10px; font-size: 16px; outline: none;
        }

        .btn { 
            width: 100%; padding: 15px; border-radius: 12px; border: none;
            font-weight: bold; cursor: pointer; text-transform: uppercase; transition: 0.3s;
        }
        .btn-gold { background: var(--gold); color: black; margin-top: 10px; box-shadow: 0 4px 15px rgba(212, 175, 55, 0.3); }
        .btn-dl { background: transparent; border: 1px solid var(--gold); color: var(--gold); margin-bottom: 15px; font-size: 12px; }

        .ayah-card { 
            padding: 25px; margin: 15px; background: var(--card-bg); 
            border-radius: 15px; border: 1px solid rgba(255,255,255,0.05); transition: 0.3s;
        }
        .ayah-card.active { border: 1px solid var(--gold); background: rgba(212, 175, 55, 0.1); transform: scale(1.02); }
        
        .ar { font-family: 'Amiri', serif; font-size: 28px; text-align: right; color: #fff; display: block; line-height: 2; direction: rtl; }
        .fr { font-size: 14px; color: #aaa; margin-top: 15px; display: block; line-height: 1.5; }

        /* LISTE TELECHARGEMENTS AMELIOREE */
        .download-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 12px; border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .btn-play-sm { background: var(--gold); border: none; padding: 5px 10px; border-radius: 5px; font-size: 10px; font-weight: bold; }

        /* PLAYER FLOTTANT MOBILE */
        .player {
            position: fixed; bottom: 15px; left: 15px; right: 15px;
            background: rgba(10,10,10,0.95); border: 1px solid var(--gold);
            border-radius: 20px; padding: 15px; z-index: 1000; box-shadow: 0 -10px 30px rgba(0,0,0,0.8);
            backdrop-filter: blur(15px);
        }
        #progress-container { height: 4px; background: rgba(255,255,255,0.1); border-radius: 2px; margin-bottom: 10px; overflow: hidden; }
        #progress { height: 100%; background: var(--gold); width: 0%; transition: 0.1s; }
        
        .controls { display: flex; justify-content: space-around; align-items: center; }
        .ctrl-btn { background: none; border: none; color: white; font-size: 24px; padding: 10px; }
        #playBtn { font-size: 45px; color: var(--gold); }

        .badge-offline { background: #10b981; color: white; padding: 2px 6px; border-radius: 4px; font-size: 9px; margin-left: 5px; }
    </style>
</head>
<body>

<header><div class="logo">KELE-CORAN</div></header>

<div class="panel">
    <label>Sourate</label>
    <select id="sNum"></select>
    
    <div style="display:flex; gap:10px">
        <div style="flex:1"><label>Début</label><input type="number" id="vStart" value="1"></div>
        <div style="flex:1"><label>Fin</label><input type="number" id="vEnd" value="7"></div>
    </div>

    <label>Récitateur</label>
    <select id="reciter">
        <option value="Alafasy_128kbps">Mishary Alafasy</option>
        <option value="Hussary_64kbps">Hussary (Murattal)</option>
        <option value="Minshawy_Mujawwad_128kbps">Minshawy (Mujawwad)</option>
    </select>

    <div style="display:flex; gap:10px">
        <div style="flex:1"><label>Répétitions Verset</label><input type="number" id="rep" value="1"></div>
        <div style="flex:1"><label>Répétitions Cycle</label><input type="number" id="repCycle" value="1"></div>
    </div>
    
    <div style="display:flex; gap:10px; align-items:center; margin-bottom:15px;">
        <div style="flex:1; display:flex; align-items:center; gap:8px; background: rgba(255,255,255,0.05); padding: 10px; border-radius: 10px;">
            <input type="checkbox" id="autoNext" checked style="width:18px; height:18px;">
            <label style="margin:0; font-size:11px;" for="autoNext">Auto Suivant</label>
        </div>
        <div style="flex:1">
            <select id="speed" style="margin:0;">
                <option value="1">Vitesse 1x</option>
                <option value="1.25">1.25x</option>
                <option value="1.5">1.5x</option>
            </select>
        </div>
    </div>

    <button class="btn btn-dl" id="dlBtn">📥 Télécharger pour Hors-ligne</button>
    <button class="btn btn-gold" id="startBtn">Démarrer la lecture</button>
</div>

<div class="panel">
    <label>Ma Bibliothèque Hors-ligne</label>
    <div id="downloadedList" style="max-height:150px; overflow-y:auto; margin-top:10px;">
        <small style="color:#666">Chargement de la bibliothèque...</small>
    </div>
</div>

<div id="displayZone"></div>

<div class="player">
    <div id="status" style="text-align:center; color:var(--gold); font-size:11px; margin-bottom:8px; font-weight: bold;">Prêt</div>
    <div id="progress-container"><div id="progress"></div></div>
    <div class="controls">
        <button class="ctrl-btn" onclick="skip(-1)">⏮</button>
        <button class="ctrl-btn" id="playBtn">▶</button>
        <button class="ctrl-btn" onclick="skip(1)">⏭</button>
    </div>
</div>

<audio id="audio"></audio>

<script>
    const audio = document.getElementById('audio');
    const CACHE_NAME = "kele-coran-v5";
    let playlist = [];
    let curIdx = 0;
    let curRep = 0;
    let curCycleRep = 0;

    // Configuration PWA Dynamique
    const manifest = {
        "name": "Kele Coran",
        "short_name": "Kele",
        "start_url": ".",
        "display": "standalone",
        "background_color": "#000000",
        "theme_color": "#064e3b",
        "icons": [{ "src": "https://cdn-icons-png.flaticon.com/512/2850/2850811.png", "sizes": "512x512", "type": "image/png" }]
    };
    document.getElementById('manifest-link').setAttribute('href', 'data:application/json;base64,' + btoa(JSON.stringify(manifest)));

    async function init() {
        try {
            const res = await fetch("https://api.alquran.cloud/v1/surah");
            const data = await res.json();
            localStorage.setItem("surahs_list", JSON.stringify(data));
            renderSurahSelect(data.data);
        } catch (e) {
            const cached = JSON.parse(localStorage.getItem("surahs_list"));
            if(cached) renderSurahSelect(cached.data);
        }
        updateDownloadedSurahs();
    }

    function renderSurahSelect(list) {
        document.getElementById('sNum').innerHTML = list.map(s => `<option value="${s.number}">${s.number}. ${s.englishName}</option>`).join('');
    }

    // LISTE DES TELECHARGEMENTS CLIQUABLE
    function updateDownloadedSurahs() {
        const listDiv = document.getElementById('downloadedList');
        const surahsList = JSON.parse(localStorage.getItem("surahs_list"));
        let html = '';
        
        for(let i = 1; i <= 114; i++) {
            if(localStorage.getItem(`s${i}_ar`)) {
                let sName = surahsList ? surahsList.data.find(x => x.number === i).englishName : `Sourate ${i}`;
                html += `
                <div class="download-item">
                    <span>${i}. ${sName} <span class="badge-offline">HORS-LIGNE</span></span>
                    <button class="btn-play-sm" onclick="quickPlay(${i})">LIRE</button>
                </div>`;
            }
        }
        listDiv.innerHTML = html || '<small style="color:#666">Aucune sourate téléchargée.</small>';
    }

    window.quickPlay = (id) => {
        document.getElementById('sNum').value = id;
        document.getElementById('vStart').value = 1;
        document.getElementById('startBtn').click();
        window.scrollTo({top: 0, behavior: 'smooth'});
    };

    // TELECHARGEMENT AMELIORE
    document.getElementById('dlBtn').onclick = async () => {
        const s = document.getElementById('sNum').value;
        const r = document.getElementById('reciter').value;
        const status = document.getElementById('status');
        
        status.innerText = "Téléchargement en cours...";
        
        try {
            const resAr = await fetch(`https://api.alquran.cloud/v1/surah/${s}`);
            const resFr = await fetch(`https://api.alquran.cloud/v1/surah/${s}/fr.hamidullah`);
            const dAr = await resAr.json();
            const dFr = await resFr.json();
            
            localStorage.setItem(`s${s}_ar`, JSON.stringify(dAr.data));
            localStorage.setItem(`s${s}_fr`, JSON.stringify(dFr.data));

            const cache = await caches.open(CACHE_NAME);
            const ayahs = dAr.data.ayahs;

            for (let i = 0; i < ayahs.length; i++) {
                status.innerText = `⏳ Audio ${i+1}/${ayahs.length}`;
                const url = `https://everyayah.com/data/${r}/${s.padStart(3,'0')}${(i+1).toString().padStart(3,'0')}.mp3`;
                
                const cachedRes = await cache.match(url);
                if(!cachedRes) {
                    const resp = await fetch(url);
                    if (resp.ok) await cache.put(url, resp);
                }
            }
            status.innerText = "✅ Disponible hors-ligne !";
            updateDownloadedSurahs();
        } catch (e) {
            status.innerText = "❌ Erreur. Vérifiez votre connexion.";
        }
    };

    // LECTURE
    document.getElementById('startBtn').onclick = async () => {
        const s = document.getElementById('sNum').value;
        const vS = parseInt(document.getElementById('vStart').value);
        const vE = parseInt(document.getElementById('vEnd').value);
        
        const dAr = JSON.parse(localStorage.getItem(`s${s}_ar`));
        const dFr = JSON.parse(localStorage.getItem(`s${s}_fr`));

        if(!dAr) return alert("Veuillez d'abord télécharger cette sourate pour le mode hors-ligne.");

        playlist = [];
        for(let i = vS-1; i < vE; i++) {
            if(dAr.ayahs[i]) {
                const url = `https://everyayah.com/data/${document.getElementById('reciter').value}/${s.padStart(3,'0')}${(i+1).toString().padStart(3,'0')}.mp3`;
                playlist.push({ url, ar: dAr.ayahs[i].text, fr: dFr.ayahs[i].text, v: i+1, sName: dAr.englishName });
            }
        }
        curIdx = 0; curRep = 0; curCycleRep = 0;
        render();
        play();
    };

    function render() {
        document.getElementById('displayZone').innerHTML = playlist.map((p, i) => `
            <div class="ayah-card" id="a${i}">
                <span class="ar">${p.ar}</span>
                <span class="fr">${p.fr}</span>
                <div style="margin-top:10px; font-size:10px; color:var(--gold)">SOURATE ${p.sName} | VERSET ${p.v}</div>
            </div>
        `).join('');
    }

    async function play() {
        if(curIdx >= playlist.length) return;
        const item = playlist[curIdx];
        const cache = await caches.open(CACHE_NAME);
        const cached = await cache.match(item.url);

        // Crucial pour la veille : Utilisation d'un Blob URL pour l'audio mis en cache
        audio.src = cached ? URL.createObjectURL(await cached.blob()) : item.url;
        audio.playbackRate = parseFloat(document.getElementById('speed').value);
        
        document.querySelectorAll('.ayah-card').forEach(c => c.classList.remove('active'));
        const el = document.getElementById(`a${curIdx}`);
        if(el) {
            el.classList.add('active');
            el.scrollIntoView({behavior:'smooth', block:'center'});
        }

        audio.play().catch(e => console.log("Lecture bloquée, interaction requise"));
        document.getElementById('playBtn').innerText = "⏸";
        document.getElementById('status').innerText = `Verset ${item.v} - Rep. ${curRep+1}/${document.getElementById('rep').value}`;

        // CONTROLES ECRAN DE VERROUILLAGE (VEILLE)
        if ('mediaSession' in navigator) {
            navigator.mediaSession.metadata = new MediaMetadata({
                title: `Verset ${item.v}`,
                artist: item.sName,
                album: 'Kele Coran Offline',
                artwork: [{ src: 'https://cdn-icons-png.flaticon.com/512/2850/2850811.png', sizes: '512x512', type: 'image/png' }]
            });
            navigator.mediaSession.setActionHandler('play', () => audio.play());
            navigator.mediaSession.setActionHandler('pause', () => audio.pause());
            navigator.mediaSession.setActionHandler('previoustrack', () => skip(-1));
            navigator.mediaSession.setActionHandler('nexttrack', () => skip(1));
        }
    }

    audio.onended = () => {
        curRep++;
        if(curRep < parseInt(document.getElementById('rep').value)) {
            audio.currentTime = 0;
            audio.play();
        } else {
            curRep = 0; 
            if(!document.getElementById('autoNext').checked) {
                document.getElementById('playBtn').innerText = "▶";
                return;
            }
            curIdx++;
            if(curIdx < playlist.length) play();
            else {
                curCycleRep++;
                if(curCycleRep < parseInt(document.getElementById('repCycle').value)) {
                    curIdx = 0; play();
                } else {
                    document.getElementById('status').innerText = "Cycle terminé";
                    document.getElementById('playBtn').innerText = "▶";
                }
            }
        }
    };

    document.getElementById('playBtn').onclick = () => {
        if(audio.paused) { audio.play(); document.getElementById('playBtn').innerText = "⏸"; }
        else { audio.pause(); document.getElementById('playBtn').innerText = "▶"; }
    };

    function skip(n) { 
        curIdx += n; 
        if(curIdx < 0) curIdx = 0;
        if(curIdx >= playlist.length) curIdx = playlist.length - 1;
        curRep = 0; 
        play(); 
    }

    audio.ontimeupdate = () => {
        document.getElementById('progress').style.width = (audio.currentTime / audio.duration * 100) + "%";
    };

    init();

    // SERVICE WORKER INTERNE (PWA)
    if ('serviceWorker' in navigator) {
        const swCode = `
            const CACHE = "${CACHE_NAME}";
            self.addEventListener('install', e => self.skipWaiting());
            self.addEventListener('fetch', e => {
                e.respondWith(caches.match(e.request).then(res => res || fetch(e.request)));
            });
        `;
        const blob = new Blob([swCode], {type: 'application/javascript'});
        navigator.serviceWorker.register(URL.createObjectURL(blob));
    }
</script>
</body>
        </html>
